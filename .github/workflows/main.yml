name: Fetch Sleeper Data & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # auto-refresh every 6 hours
  workflow_dispatch:
    inputs:
      league_id:
        description: 'Sleeper League ID to pre-fetch'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Sleeper Players DB
        run: |
          mkdir -p data
          echo "Fetching NFL players database..."
          curl -s "https://api.sleeper.app/v1/players/nfl" \
            -H "Accept: application/json" \
            -o data/players.json
          echo "Players fetched: $(wc -c < data/players.json) bytes"

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.json
          git diff --staged --quiet || git commit -m "chore: refresh player data [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
